<!DOCTYPE html>
<html>
<head>
<title>NextMovie</title>

<style>

body{
    font-family: Arial, sans-serif;
    margin:0;
    padding:0;
    background: linear-gradient(135deg,#667eea,#764ba2);
    color:white;
}

.container{
    width:80%;
    margin:auto;
    padding:20px;
}

.logo{
    text-align:center;
    font-size:42px;
    font-weight:bold;
    letter-spacing:2px;
}

.tagline{
    text-align:center;
    margin-top:-5px;
    margin-bottom:20px;
    font-size:18px;
    color:#ffd700;
}

form{
    background:rgba(0,0,0,0.4);
    padding:20px;
    border-radius:10px;
}

select{
    padding:8px;
    margin-bottom:10px;
}

button{
    background:#ff7b54;
    border:none;
    padding:10px 20px;
    color:white;
    border-radius:6px;
    cursor:pointer;
    font-weight:bold;
}

button:hover{
    background:#ff5722;
}

.movies{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(300px,1fr));
    gap:20px;
    margin-top:20px;
}

.movie-card{
    background:rgba(255,255,255,0.1);
    padding:15px;
    border-radius:10px;
    backdrop-filter: blur(6px);
}

.movie-card h3{
    margin-top:0;
}

.details{
    margin-top:10px;
}

.genre-box{
    display:grid;
    grid-template-columns:repeat(4,1fr);
}

</style>

</head>

<body>

<div class="container">

<div class="logo">🎬 NextMovie</div>
<div class="tagline">Find your next movie by language and genre</div>

<form method="POST">

<h3>Select Language</h3>

<select name="language" required>

<option value="" disabled
{% if not selected_language %}selected{% endif %}>
Select your language
</option>

{% for lang, code in languages.items() %}

<option value="{{ code }}"
{% if selected_language == code %}selected{% endif %}>
{{ lang }}
</option>

{% endfor %}

</select>

<h3>Select Genres</h3>

<div class="genre-box">

{% for genre in genres %}

<label>
<input type="checkbox"
name="genres"
value="{{ genre }}"
{% if genre in selected_genres %}checked{% endif %}>
{{ genre }}
</label>

{% endfor %}

</div>

<br>

<button type="submit">Get Recommendations</button>

</form>

<hr>

<h2>Movies</h2>

<div class="movies">

{% for movie in movies %}

<div class="movie-card">

<h3>{{ movie.title }}</h3>

<p><b>Release:</b> {{ movie.release }}</p>

<p><b>Rating:</b> ⭐ {{ movie.rating }}</p>

<p>{{ movie.overview }}</p>

<button onclick="loadDetails({{ movie.id }})">Show Details</button>

<div class="details" id="details-{{ movie.id }}"></div>

</div>

{% endfor %}

</div>

</div>

<script>

function loadDetails(movieId){

fetch("/movie/" + movieId)

.then(response => response.json())

.then(function(data){

var html = "<p><b>Cast:</b> " + data.cast.join(", ") + "</p>";

if(data.trailer){
html += '<p><a style="color:#ffd700" href="' + data.trailer + '" target="_blank">▶ Watch Trailer</a></p>';
}
else{
html += "<p>No trailer available</p>";
}

document.getElementById("details-" + movieId).innerHTML = html;

})

.catch(function(err){console.log(err);});

}

</script>

</body>
</html>
